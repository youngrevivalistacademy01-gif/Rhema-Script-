<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhema Script | Divine Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="divine-wrapper">
        <header class="heavenly-header">
            <div class="logo">RHEMA <span>SCRIPT</span></div>
            <div id="status-indicator" class="status-dot"></div>
        </header>

        <section class="transcript-container">
            <span class="label">LIVE LISTENER</span>
            <div id="live-text" class="interim-text">Waiting for the Word...</div>
        </section>

        <main class="scripture-stage">
            <div id="placeholder" class="watermark">“Faith comes by hearing...”</div>
            
            <article class="verse-card">
                <h1 id="reference-title" class="gold-text"></h1>
                <p id="verse-content" class="scripture-text"></p>
            </article>
        </main>

        <footer class="control-bar">
            <button id="start-btn" class="btn-primary">Start Listening</button>
            <button id="clear-btn" class="btn-outline">Clear Screen</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
